name: KVideo
options:
  bundleIdPrefix: com.kvideo
  deploymentTarget:
    macOS: "13.0"
targets:
  KVideo:
    type: application
    platform: macOS
    sources:
      - KVideo
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kvideo.macos
        PRODUCT_NAME: KVideo
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_NSMainStoryboardFile: ""
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.entertainment"
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: "NO"
        ENABLE_HARDENED_RUNTIME: "NO"
        INFOPLIST_KEY_com.apple.security.network.client: "YES"
